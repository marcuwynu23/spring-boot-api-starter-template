# Logical application name used in logs/observability and by some Spring tooling.
spring.application.name=spring-boot-api-starter-template

# Datasource JDBC URL. Default uses local SQLite file at project root.
# Change this value to switch database engine/host.
spring.datasource.url=jdbc:sqlite:./app.db
# JDBC driver class for the configured datasource URL.
spring.datasource.driverClassName=org.sqlite.JDBC
# Username for databases that require authentication (unused for SQLite).
spring.datasource.username=
# Password for databases that require authentication (unused for SQLite).
spring.datasource.password=

# Schema management strategy:
# - update: auto-creates/updates tables in development
# - validate/none: safer for production when using migrations
spring.jpa.hibernate.ddl-auto=update
# When true, logs generated SQL statements.
spring.jpa.show-sql=true
# Pretty-prints SQL in logs for readability.
spring.jpa.properties.hibernate.format_sql=true
# Explicit Hibernate dialect so ORM generates SQLite-compatible SQL.
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
